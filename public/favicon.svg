<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Professional gradient (subtle, elegant) -->
    <linearGradient id="professionalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background gradient (professional dark) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#110f1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0c16;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="100" height="100" fill="url(#bgGrad)" rx="22"/>
  
  <!-- Subtle inner border -->
  <rect 
    x="3" 
    y="3" 
    width="94" 
    height="94" 
    rx="19" 
    fill="none" 
    stroke="url(#professionalGrad)" 
    stroke-width="0.5" 
    opacity="0.2"/>
  
  <!-- Main "S" - Clean and Bold -->
  <text 
    x="50" 
    y="74" 
    font-size="68" 
    font-weight="900" 
    font-family="Arial Black, Arial, sans-serif"
    text-anchor="middle" 
    fill="url(#professionalGrad)"
    filter="url(#shadow)"
    style="font-weight: 900;">S</text>
  
  <!-- Subtle highlight for depth (top-left) -->
  <text 
    x="50" 
    y="74" 
    font-size="68" 
    font-weight="900" 
    font-family="Arial Black, Arial, sans-serif"
    text-anchor="middle" 
    fill="#ffffff"
    opacity="0.12"
    transform="translate(-1, -1)">S</text>
</svg>
